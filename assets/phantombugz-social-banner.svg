<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" role="img" aria-labelledby="title desc">
  <title id="title">PhantomBugz social banner</title>
  <desc id="desc">A PhantomBugz banner for GitHub, Discord, and social profiles with signal mesh, brand mark, and bounty command copy.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1500" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020606"/>
      <stop offset=".48" stop-color="#062126"/>
      <stop offset="1" stop-color="#020909"/>
    </linearGradient>
    <linearGradient id="signal" x1="170" y1="95" x2="1320" y2="432" gradientUnits="userSpaceOnUse">
      <stop stop-color="#37ff9a"/>
      <stop offset=".54" stop-color="#17a8ff"/>
      <stop offset="1" stop-color="#0a3238"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#37ff9a" flood-opacity=".32"/>
      <feDropShadow dx="0" dy="22" stdDeviation="32" flood-color="#000000" flood-opacity=".7"/>
    </filter>
  </defs>
  <rect width="1500" height="500" fill="url(#bg)"/>
  <g opacity=".22" stroke-width="5" fill="none">
    <path d="M-20 120C180 70 290 190 460 130s310-68 460-5 312 67 600-2" stroke="#17a8ff"/>
    <path d="M-20 208C180 158 290 278 460 218s310-68 460-5 312 67 600-2" stroke="#37ff9a"/>
    <path d="M-20 296C180 246 290 366 460 306s310-68 460-5 312 67 600-2" stroke="#17a8ff"/>
    <path d="M-20 384C180 334 290 454 460 394s310-68 460-5 312 67 600-2" stroke="#37ff9a"/>
  </g>
  <g transform="translate(112 86)" filter="url(#glow)">
    <rect width="168" height="168" rx="34" fill="#031014" stroke="#174b52" stroke-width="4"/>
    <path d="M84 19c32 0 71 41 88 88 15 43 8 93-18 130-20 29-44 43-70 43s-50-14-70-43C-12 200-19 150-4 107 13 60 52 19 84 19Z" transform="translate(0 -2) scale(.82) translate(18 0)" fill="url(#signal)"/>
    <path d="M84 43c13 20 21 40 24 62l-24 18-24-18c3-22 11-42 24-62Z" fill="#031014" opacity=".85"/>
    <path d="M45 92h78M39 118h90M50 144h68" fill="none" stroke="#031014" stroke-width="10" stroke-linecap="round" opacity=".86"/>
    <path d="M26 92C-8 88-38 75-64 54M142 92c34-4 64-17 90-38M26 142c-36 4-69 17-98 38M142 142c36 4 69 17 98 38" fill="none" stroke="#37ff9a" stroke-width="10" stroke-linecap="round" opacity=".78"/>
  </g>
  <g transform="translate(334 122)">
    <text x="0" y="82" fill="#ecfffb" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="86" font-weight="900">PhantomBugz</text>
    <text x="2" y="126" fill="#37ff9a" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="22" font-weight="800" letter-spacing="4">SECURITY RESEARCH LAB / SIGNAL GEAR</text>
    <text x="2" y="180" fill="#b9d8d2" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="27" font-weight="500">Public-safe bounty telemetry and field-grade gear.</text>
  </g>
  <g transform="translate(1114 132)">
    <rect width="286" height="190" rx="12" fill="#031014" fill-opacity=".72" stroke="#37ff9a" stroke-opacity=".35"/>
    <text x="24" y="48" fill="#90afa8" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="20">2026-07 sprint</text>
    <text x="24" y="106" fill="#ecfffb" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="54" font-weight="900">$25,000</text>
    <rect x="24" y="128" width="238" height="10" rx="5" fill="#173137"/>
    <rect x="24" y="128" width="10" height="10" rx="5" fill="#37ff9a"/>
    <text x="24" y="168" fill="#37ff9a" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="19" font-weight="800">1 package ready</text>
  </g>
